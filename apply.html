<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>応募フォーム | ROMEO & JULIET</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+JP:wght@200;400;600;700&family=Noto+Sans+JP:wght@300;400;500;700&display=swap" rel="stylesheet">
<style>
  :root{
    --bg-deep: #17100E;
    --bg-panel: #1F1613;
    --gold: #C9A25D;
    --gold-soft: #DDC28C;
    --ivory: #F0E9DD;
    --terracotta: #8B5E4A;
    --line: rgba(201,162,93,0.18);
    --serif: 'Noto Serif JP', serif;
    --sans: 'Noto Sans JP', sans-serif;
  }
  *{box-sizing:border-box; margin:0; padding:0;}
  html{background-color:var(--bg-deep);}
  body{
    background-color:var(--bg-deep);
    color:var(--ivory);
    font-family:var(--sans);
    line-height:1.9;
    -webkit-font-smoothing:antialiased;
    min-height:100vh;
  }
  @media (prefers-reduced-motion: reduce){
    *{animation-duration:0.01ms !important; animation-iteration-count:1 !important; transition-duration:0.01ms !important;}
  }
  a{color:inherit;}
  .wrap{max-width:520px; margin:0 auto; padding:0 24px;}

  header{
    padding:28px 24px; text-align:center;
    border-bottom:1px solid var(--line);
  }
  .header-logo{width:44px; height:auto; margin:0 auto 14px; display:block; opacity:0.9;}
  .brand{font-family:var(--serif); font-weight:600; letter-spacing:0.1em; font-size:15px; color:var(--gold-soft);}
  .brand small{display:block; font-family:var(--sans); font-weight:300; font-size:10px; letter-spacing:0.2em; color:rgba(240,233,221,0.5); margin-top:4px;}

  main{padding:60px 0 80px;}

  .form-intro{text-align:center; margin-bottom:48px;}
  .form-eyebrow{font-size:11px; letter-spacing:0.3em; color:var(--gold); margin-bottom:16px;}
  .form-title{font-family:var(--serif); font-weight:600; font-size:clamp(22px,5vw,28px); color:var(--ivory); margin-bottom:16px;}
  .form-lead{font-size:13.5px; color:rgba(240,233,221,0.6); max-width:380px; margin:0 auto;}

  form{display:flex; flex-direction:column; gap:28px;}

  .field{display:flex; flex-direction:column; gap:10px;}
  .field label{
    font-family:var(--serif); font-size:13.5px; letter-spacing:0.08em; color:var(--gold-soft);
    display:flex; align-items:baseline; gap:8px;
  }
  .required{font-size:10px; color:var(--terracotta); letter-spacing:0.1em; font-family:var(--sans);}
  .field label .optional{font-size:10px; color:rgba(240,233,221,0.35); letter-spacing:0.1em; font-family:var(--sans);}

  input[type="text"], input[type="tel"], textarea{
    background:var(--bg-panel);
    border:1px solid var(--line);
    color:var(--ivory);
    padding:15px 16px;
    font-family:var(--sans);
    font-size:14.5px;
    border-radius:2px;
    transition:border-color 0.25s;
    width:100%;
  }
  input[type="text"]:focus, input[type="tel"]:focus, textarea:focus{
    outline:none; border-color:var(--gold);
  }
  input::placeholder, textarea::placeholder{color:rgba(240,233,221,0.28);}
  textarea{resize:vertical; min-height:88px;}

  .radio-group{display:flex; flex-direction:column; gap:10px;}
  .radio-option{
    display:flex; align-items:center; gap:12px;
    background:var(--bg-panel); border:1px solid var(--line);
    padding:14px 16px; border-radius:2px; cursor:pointer;
    transition:border-color 0.25s, background 0.25s;
  }
  .radio-option:has(input:checked){
    border-color:var(--gold); background:rgba(201,162,93,0.08);
  }
  .radio-option input[type="radio"]{
    accent-color:var(--gold); width:16px; height:16px; flex-shrink:0;
  }
  .radio-option span{font-size:14px; color:var(--ivory);}

  .age-check{
    display:flex; align-items:center; gap:12px;
    background:var(--bg-panel); border:1px solid var(--line);
    padding:14px 16px; border-radius:2px;
  }
  .age-check input[type="checkbox"]{accent-color:var(--gold); width:16px; height:16px; flex-shrink:0;}
  .age-check > span{font-size:13px; color:rgba(240,233,221,0.75);}

  .sub-field{
    animation: fieldReveal 0.3s ease;
  }
  @keyframes fieldReveal{
    from{ opacity:0; transform:translateY(-6px); }
    to{ opacity:1; transform:translateY(0); }
  }

  .submit-btn{
    background:var(--gold); color:var(--bg-deep);
    border:none; padding:18px 24px;
    font-family:var(--sans); font-weight:700; font-size:14px; letter-spacing:0.15em;
    border-radius:2px; cursor:pointer;
    transition:background 0.3s;
    margin-top:8px;
  }
  .submit-btn:hover{background:var(--gold-soft);}
  .submit-btn:disabled{opacity:0.5; cursor:not-allowed;}

  .form-note{
    text-align:center; font-size:11.5px; color:rgba(240,233,221,0.35);
    margin-top:8px; line-height:1.8;
  }

  /* 送信完了メッセージ */
  .success-panel{
    display:none; text-align:center; padding:60px 0;
  }
  .success-panel.show{display:block;}
  .success-panel .icon{
    width:56px; height:56px; border:1px solid var(--gold); border-radius:50%;
    display:flex; align-items:center; justify-content:center;
    margin:0 auto 28px; font-size:22px; color:var(--gold-soft); font-family:var(--serif);
  }
  .success-panel h2{font-family:var(--serif); font-size:22px; color:var(--ivory); margin-bottom:16px;}
  .success-panel p{font-size:13.5px; color:rgba(240,233,221,0.6); max-width:340px; margin:0 auto;}

  .error-message{
    display:none; font-size:12.5px; color:#D98757; text-align:center; margin-top:-8px;
  }
  .error-message.show{display:block;}

  footer{padding:40px 24px; text-align:center; border-top:1px solid var(--line);}
  footer p{font-size:11px; letter-spacing:0.1em; color:rgba(240,233,221,0.35);}

  a:focus-visible, input:focus-visible, textarea:focus-visible, button:focus-visible{
    outline:2px solid var(--gold); outline-offset:2px;
  }
</style>
</head>

        <label for="name">お名前(ニックネーム可)<span class="required">必須</span></label>
        <input type="text" id="name" name="お名前" placeholder="例:レオ" required>
      </div>

      <div class="field">
        <label for="phone">電話番号<span class="required">必須</span></label>
        <input type="tel" id="phone" name="電話番号" placeholder="例:090-XXXX-XXXX" required>
      </div>

      <div class="field">
        <label>ご希望の連絡方法<span class="required">必須</span></label>
        <div class="radio-group">
          <label class="radio-option">
            <input type="radio" name="連絡方法" value="電話" required data-contact="none">
            <span>電話</span>
          </label>
          <label class="radio-option">
            <input type="radio" name="連絡方法" value="LINE" data-contact="line">
            <span>LINE</span>
          </label>
          <label class="radio-option">
            <input type="radio" name="連絡方法" value="Instagram DM" data-contact="instagram">
            <span>Instagram DM</span>
          </label>
        </div>
      </div>

      <div class="field sub-field" id="lineField" style="display:none;">
        <label for="lineId">LINE ID<span class="required">必須</span></label>
        <input type="text" id="lineId" name="LINE ID" placeholder="例:line_id_1234">
      </div>

      <div class="field sub-field" id="igField" style="display:none;">
        <label for="igId">Instagram ID<span class="required">必須</span></label>
        <input type="text" id="igId" name="Instagram ID" placeholder="例:@your_account">
      </div>

      <div class="field">
        <label for="message">ひとこと<span class="optional">任意</span></label>
        <textarea id="message" name="ひとこと" placeholder="気になっていること、聞いてみたいことがあれば"></textarea>
      </div>

      <div class="age-check">
        <input type="checkbox" id="ageCheck" name="年齢確認" value="18歳以上です" required>
        <span>18歳以上です<span class="required" style="margin-left:8px;">必須</span></span>
      </div>

      <p class="error-message" id="errorMsg">送信に失敗しました。もう一度お試しください。</p>

      <button type="submit" class="submit-btn" id="submitBtn">送信する</button>

      <p class="form-note">送信内容は面談・ご連絡のみに使用します。</p>
    </form>
  </div>

  <div class="success-panel" id="successPanel">
    <div class="icon">✓</div>
    <h2>送信しました</h2>
    <p>ご連絡ありがとうございます。<br>担当より、ご希望の連絡方法にて折り返しいたします。</p>
  </div>

</main>

<footer>
  <p>ROMEO &amp; JULIET — RAIN GROUP 本店</p>
</footer>

<script>
  const form = document.getElementById('applyForm');
  const formView = document.getElementById('formView');
  const successPanel = document.getElementById('successPanel');
  const submitBtn = document.getElementById('submitBtn');
  const errorMsg = document.getElementById('errorMsg');

  const contactRadios = document.querySelectorAll('input[name="連絡方法"]');
  const lineField = document.getElementById('lineField');
  const igField = document.getElementById('igField');
  const lineInput = document.getElementById('lineId');
  const igInput = document.getElementById('igId');

  // 連絡方法選択に応じてLINE ID / Instagram ID欄の表示・必須切り替え
  function updateContactFields(){
    const selected = document.querySelector('input[name="連絡方法"]:checked');
    const type = selected ? selected.dataset.contact : 'none';

    if(type === 'line'){
      lineField.style.display = 'flex';
      lineInput.required = true;
      igField.style.display = 'none';
      igInput.required = false;
      igInput.value = '';
    } else if(type === 'instagram'){
      igField.style.display = 'flex';
      igInput.required = true;
      lineField.style.display = 'none';
      lineInput.required = false;
      lineInput.value = '';
    } else {
      lineField.style.display = 'none';
      igField.style.display = 'none';
      lineInput.required = false;
      igInput.required = false;
      lineInput.value = '';
      igInput.value = '';
    }
    updateSubmitState();
  }

  contactRadios.forEach(radio => {
    radio.addEventListener('change', updateContactFields);
  });

  // 必須項目がすべて埋まっているか判定し、送信ボタンの活性状態を切り替える
  function updateSubmitState(){
    const requiredFields = form.querySelectorAll('[required]');
    let allFilled = true;

    requiredFields.forEach(field => {
      if(field.offsetParent === null) return; // 非表示の必須項目はチェック対象外
      if(field.type === 'checkbox' || field.type === 'radio'){
        if(field.type === 'radio'){
          const group = form.querySelectorAll(`input[name="${field.name}"]`);
          const checked = Array.from(group).some(r => r.checked);
          if(!checked) allFilled = false;
        } else if(!field.checked){
          allFilled = false;
        }
      } else if(!field.value.trim()){
        allFilled = false;
      }
    });

    submitBtn.disabled = !allFilled;
  }

  form.addEventListener('input', updateSubmitState);
  form.addEventListener('change', updateSubmitState);

  // 初期状態:送信ボタンを非活性に
  submitBtn.disabled = true;
  updateContactFields();

  form.addEventListener('submit', async function(e){
    e.preventDefault();
    errorMsg.classList.remove('show');
    submitBtn.disabled = true;
    submitBtn.textContent = '送信中…';

    try{
      const response = await fetch(form.action, {
        method: 'POST',
        body: new FormData(form),
        headers: { 'Accept': 'application/json' }
      });

      if(response.ok){
        formView.style.display = 'none';
        successPanel.classList.add('show');
      } else {
        throw new Error('submit failed');
      }
    } catch(err){
      errorMsg.classList.add('show');
      updateSubmitState();
      submitBtn.textContent = '送信する';
    }
  });
</script>

</body>
</html>
